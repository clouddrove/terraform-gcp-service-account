name: Auto Assign PRs

on:
  pull_request:
    types: [opened, reopened]

  workflow_dispatch:
jobs:
  assignee:
    uses: clouddrove/github-shared-workflows/.github/workflows/auto_assignee.yml@2.0.0
    secrets:
      GITHUB: ${{ secrets.GITHUB }}
    with:
      provider: none
      enable_version_check: true
      working_directory: './examples/'
